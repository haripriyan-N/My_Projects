<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Projects</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .box {
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: black;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-5px);
            background: #007bff;
            color: white;
        }
    </style>
</head>

<body>

    <h1>My Projects</h1>

    <div class="container">

        <a href="./Javascipt/To-do-list/index.html" class="box">
            <h2>Project 1</h2>
            <p>View Project</p>
        </a>

        <a href="./Javascipt/Tip_calculator/index.html" class="box">
            <h2>Project 2</h2>
            <p>View Project</p>
        </a>

        <a href="./Javascipt/Calculator/index.html" class="box">
            <h2>Project 3</h2>
            <p>View Project</p>
        </a>

    </div>

</body>

</html>
